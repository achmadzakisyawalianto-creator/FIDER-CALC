<!DOCTYPE html>
<html lang="id">

<head>

  <meta charset="utf-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1">

  <title>FIDER-CALC</title>

  <!-- FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap"
        rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">

</head>

<body>

  <!-- =========================
       MENU AWAL
  ========================== -->
  <div id="menu" class="slide active">

    <div class="container">

      <!-- HEADER APP -->
      <div class="header-app">

        <!-- LOGO -->
        <img src="logo-fidercalc.png"
             class="logo-app"
             alt="Logo FIDER-CALC">

        <!-- TITLE -->
        <div class="title-wrapper">

          <div class="logo-title">

            <span class="black">
              FIDER-
            </span>

            <span class="orange">
              CALC
            </span>

          </div>

          <div class="logo-subtitle">
            DETEKTOR KEBAKARAN
          </div>

          <div class="logo-line"></div>

        </div>

      </div>

      <!-- MENU -->
      <div class="menu-grid">

        <!-- MENU MATERI -->
        <div class="menu-item"
             onclick="openPage('materi')">

          <img src="https://cdn-icons-png.flaticon.com/512/2942/2942849.png"
               alt="Icon Materi">

          <p>MATERI</p>

        </div>

        <!-- MENU REGULASI -->
        <div class="menu-item"
             onclick="openPage('regulasi')">

          <img src="https://cdn-icons-png.flaticon.com/512/3062/3062634.png"
               alt="Icon Regulasi">

          <p>REGULASI</p>

        </div>

        <!-- MENU KALKULATOR -->
        <div class="menu-item"
             onclick="openPage('kalkulator')">

          <img src="kalkulator.png"
               alt="Icon Kalkulator">

          <p>KALKULATOR</p>

        </div>

      </div>

    </div>

  </div>

  <!-- =========================
       HALAMAN CONTENT
  ========================== -->
  <div id="content" class="slide">

    <div class="container">

      <!-- BUTTON BACK -->
      <button class="back"
              onclick="backMenu()">

        ← Kembali ke Menu

      </button>

      <!-- AREA DINAMIS -->
      <div id="area"></div>

    </div>

  </div>

  <!-- JAVASCRIPT -->
  <script src="script.js"></script>

</body>

</html>
